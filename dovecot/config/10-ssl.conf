# ============================================================
#  Dovecot — Configuration TLS (10-ssl.conf)
#  SecureHealth-Net
# ============================================================

# Activer SSL/TLS
ssl = required

# Certificats (partagés avec Postfix)
ssl_cert = </etc/ssl/certs/securehealth/server.crt
ssl_key = </etc/ssl/certs/securehealth/server.key

# Protocoles TLS acceptés (TLS 1.2 minimum pour la sécurité médicale)
ssl_min_protocol = TLSv1.2

# Chiffrements forts uniquement
ssl_cipher_list = ECDHE+AESGCM:DHE+AESGCM:ECDHE+AES256:DHE+AES256

# Préférer les chiffrements du serveur (évite les attaques de downgrade)
ssl_prefer_server_ciphers = yes
